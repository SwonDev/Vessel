          - table [ref=f342e320]:
            - rowgroup [ref=f342e321]:
              - row [ref=f342e322]:
                - columnheader "Fix Instructions[7]" [ref=f342e323]:
                  - generic "Fix" [ref=f342e324]
                  - text: Instructions
                  - superscript [ref=f342e325]:
                    - link "[7]" [ref=f342e326] [cursor=pointer]:
                      - /url: "#cite_note-7"
              - row [ref=f342e327]:
                - cell [ref=f342e328]:
                  - list [ref=f342e329]:
                    - listitem [ref=f342e330]: First, you will need to uninstall the "Ubisoft Game Launcher", "Uplay" or "Ubisoft Connect" from the 'Add/Remove Programs' (Windows XP) / 'Installed Programs' (Windows Vista and 7) icon in your computer's control panel. It's possible that the "Ubisoft Game Launcher/Uplay" software will not be listed if you have already uninstalled it, or the game. If so, you can skip this step.
                    - listitem [ref=f342e331]: "After uninstalling the software, you will need to manually delete any leftover files in the C:\\Program Files\\Ubisoft\\Ubisoft Game Launcher (32-bit versions of Windows) or C:\\Program Files (x86)\\Ubisoft\\Ubisoft Game Launcher (64-bit versions of Windows) folder.NOTE: Please do not skip this step, it is very important. If this folder does not exist, please go to the next step."
                    - listitem [ref=f342e332]:
                      - text: Try resetting your HOSTS file by following the steps in the following
                      - link "Microsoft article" [ref=f342e333] [cursor=pointer]:
                        - /url: https://support.microsoft.com/kb/972034/en#FixItForMeAlways
                      - text: .
                    - listitem [ref=f342e334]:
                      - text: Reinstall Ubisoft Connect from
                      - link "HERE" [ref=f342e335] [cursor=pointer]:
                        - /url: https://ubistatic3-a.akamaihd.net/orbit/launcher_installer/UbisoftConnectInstaller.exe
                      - text: .
          - heading [level=3] [ref=f342e336]:
            - generic [ref=f342e337]:
              - text: Manage game installations and folders
              - generic [ref=f342e338]:
                - text: •
                - link "Link" [ref=f342e339] [cursor=pointer]:
                  - /url: "#Manage_game_installations_and_folders"
          - generic [ref=f342e340]:
            - definition [ref=f342e341]:
              - generic "Information" [ref=f342e342]
              - text: Follow these steps to restore/import or move a game installation to another computer or partition.
            - definition [ref=f342e343]:
              - generic "More information" [ref=f342e344]
              - text: These instructions are only applicable for games that are owned, downloaded, and played through Ubisoft Connect only. For games bought on
              - link "Steam" [ref=f342e345] [cursor=pointer]:
                - /url: /wiki/Steam
              - text: ", refer to the article for that platform."
          - table [ref=f342e346]:
            - rowgroup [ref=f342e347]:
              - row [ref=f342e348]:
                - columnheader "Fix Restore/import a game install folder[8]" [ref=f342e349]:
                  - generic "Fix" [ref=f342e350]
                  - text: Restore/import a game install folder
                  - superscript [ref=f342e351]:
                    - link "[8]" [ref=f342e352] [cursor=pointer]:
                      - /url: "#cite_note-aemony-2018-09-16-8"
              - row [ref=f342e353]:
                - cell [ref=f342e354]:
                  - list [ref=f342e355]:
                    - listitem [ref=f342e356]: Launch Ubisoft Connect.
                    - listitem [ref=f342e357]: Select the game.
                    - listitem [ref=f342e358]: Click on the Locate installed game button just beneath the Download button.
                    - listitem [ref=f342e359]:
                      - text: Navigate and select
                      - link "<path-to-game>" [ref=f342e360] [cursor=pointer]:
                        - /url: /wiki/Glossary:Game_data#Installation_folder
                      - text: ", then click OK."
                    - listitem [ref=f342e361]: Ubisoft Connect will perform a file discovery and verification pass on the selected folder and verify all game files.
                    - listitem [ref=f342e362]: When Ubisoft Connect has verified all game files, click on Play to launch the game.
          - table [ref=f342e363]:
            - rowgroup [ref=f342e364]:
              - row [ref=f342e365]:
                - columnheader "Fix Move an installed game to another location[8]" [ref=f342e366]:
                  - generic "Fix" [ref=f342e367]
                  - text: Move an installed game to another location
                  - superscript [ref=f342e368]:
                    - link "[8]" [ref=f342e369] [cursor=pointer]:
                      - /url: "#cite_note-aemony-2018-09-16-8"
              - row [ref=f342e370]:
                - cell [ref=f342e371]:
                  - list [ref=f342e372]:
                    - listitem [ref=f342e373]: Open the File Manager of Windows.
                    - listitem [ref=f342e374]:
                      - text: Navigate to
                      - link "<path-to-game>" [ref=f342e375] [cursor=pointer]:
                        - /url: /wiki/Glossary:Game_data#Installation_folder
                      - text: .
                    - listitem [ref=f342e376]: Move the game folder and everything contained within it to the desired location.
                    - listitem [ref=f342e377]: Launch Ubisoft Connect.
                    - listitem [ref=f342e378]: Select the game and click on Play
                    - listitem [ref=f342e379]: An error prompt about Ubisoft Connect being unable to start the game should show up. Click on the Locate game folder button.
                    - listitem [ref=f342e380]:
                      - text: Navigate and select the new
                      - link "<path-to-game>" [ref=f342e381] [cursor=pointer]:
                        - /url: /wiki/Glossary:Game_data#Installation_folder
                      - text: ", then click OK."
                    - listitem [ref=f342e382]:
                      - text: Ubisoft Connect will perform a file discovery and verification pass on the selected folder and verify all
                      - link "game" [ref=f342e621] [cursor=pointer]:
                        - /url: "#"
                      - text: files.
                    - listitem [ref=f342e383]: When Ubisoft Connect has verified all game files, click on Play to launch the game from its new location.
