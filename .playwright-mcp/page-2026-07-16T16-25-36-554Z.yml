          - definition [ref=f342e309]:
            - generic "Disadvantage" [ref=f342e310]
            - text: Some early Ubisoft Connect games (c. 2010-2013) include a standalone installer on the installation media. The Ubisoft Connect client will run the setup from that media after the update process has finished. To fix that just eject the disc or unmount the ISO and update the game again.
