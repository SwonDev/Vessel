          - heading [level=3] [ref=f206e2377]:
            - generic [ref=f206e2378]:
              - text: 2K Accounts
              - generic [ref=f206e2379]:
                - text: •
                - link "Link" [ref=f206e2380] [cursor=pointer]:
                  - /url: "#2K_Accounts"
          - paragraph [ref=f206e2381]: "2k Accounts exist for two purposes:"
          - paragraph [ref=f206e2382]: To activate and run the game. This requires a constant Internet connection, even in single-player modes. The benefit to this, however, is that DLC, if it exists, is more easily managed than below.
          - paragraph [ref=f206e2383]: To access online features, including DLC and In-game purchases. In this case, the 2K account is not required to access single-player (in some cases, it may be required to activate the game). For DLC, however, the game will require an account either way.
          - paragraph [ref=f206e2384]: This list will be categorized as such, as well as games that use 2K Sports accounts. Single-player games in the latter category will be specially marked, either as an option or exclusively single-player.
