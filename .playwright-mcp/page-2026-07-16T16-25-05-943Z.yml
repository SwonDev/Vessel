          - paragraph [ref=f206e2318]:
            - text: Stardock distributed their games via Impulse. After they sold it to GameStop in March 2011, Stardock introduced
            - link "account system" [ref=f206e2319] [cursor=pointer]:
              - /url: https://www.stardock.com/accounts/
            - text: for their games to distribute patches and for the official support on forums. Their older games are de facto DRM free after registration, and those games are noted. You can download them any time from your Stardock account. In 2012, Stardock switched to Steamworks because of multiplayer. Those games can't be downloaded from Stardock, only from Steam.
