          - generic [ref=f206e345]:
            - definition [ref=f206e346]:
              - generic "Information" [ref=f206e347]
              - text: The
              - link "EA app" [ref=f206e348] [cursor=pointer]:
                - /url: /wiki/EA_app
              - text: is a digital distribution, DRM, multiplayer and communications service created by
              - link "EA" [ref=f206e349] [cursor=pointer]:
                - /url: /wiki/Company:Electronic_Arts
              - text: .
            - definition [ref=f206e350]:
              - generic "Information" [ref=f206e351]
              - text: Unless otherwise noted, these games require Steam and the EA app to be running in the background to work. These games do not have any client-side interaction with Steam and all services such as DLC, activation and online services are managed by the EA app client.
            - definition [ref=f206e352]:
              - generic "Disadvantage" [ref=f206e353]
              - text: Excluded from
              - link "Family Sharing" [ref=f206e354] [cursor=pointer]:
                - /url: /wiki/Steam#Family_Sharing
              - text: .
            - definition [ref=f206e355]:
              - generic "Information" [ref=f206e356]
              - text: This section is automated; refer to the individual game pages to add or update entries.
