            - definition [ref=f206e7851]:
              - generic "Information" [ref=f206e7852]
              - text: To revoke activations for EA games with SolidShield "released after May 2008" use the
              - link "EA Game Authorization Management Tool" [ref=f206e7853] [cursor=pointer]:
