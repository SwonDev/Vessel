                  - generic "Fix" [ref=f206e192]
                  - text: Game prompts for CD/product key but not an account (Hardware-based DRM)
              - row [ref=f206e193]:
                - cell "Take note of the DRM name on the prompt(s) and add it to the appropriate Hardware-based DRM section. If the prompt doesn't say what DRM is used you can scan the game with Protection ID to find out. Post the details on the project talk page. Use a link to that post as a reference for its entry below. Information Protection ID might not recognise the DRM used." [ref=f206e194]:
                  - list [ref=f206e195]:
