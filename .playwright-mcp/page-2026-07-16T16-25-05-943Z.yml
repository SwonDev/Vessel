                - code [ref=f206e7858]: activation.exe
              - text: ); see
              - link "Activation and revocation client" [ref=f206e7859] [cursor=pointer]:
                - /url: http://www.solidshield.com/docs/activation-and-revocation-client/
              - text: for further details.
