          - heading [level=3] [ref=f206e1480]:
            - generic [ref=f206e1481]:
              - text: Games for Windows Live
              - generic [ref=f206e1482]:
                - text: •
                - link "Link" [ref=f206e1483] [cursor=pointer]:
                  - /url: "#Games_for_Windows_Live"
          - generic [ref=f206e1484]:
            - definition [ref=f206e1485]:
              - generic "Disadvantage" [ref=f206e1486]
              - text: Excluded from
              - link "Family Sharing" [ref=f206e1487] [cursor=pointer]:
                - /url: /wiki/Steam#Family_Sharing
              - text: (all GFWL types)
            - definition [ref=f206e1488]:
              - generic "Information" [ref=f206e1489]
              - text: There are two kinds of GFWL activation,
              - link "Server-Side Activation (SSA)" [ref=f206e1490] [cursor=pointer]:
                - /url: "#Server-Side_Activation_.28SSA.29_titles"
              - text: and
              - link "Legacy (Per-Title 5x5)" [ref=f206e1491] [cursor=pointer]:
                - /url: "#Legacy_.28Per-Title_5x5.29_titles"
              - text: . See the sections below for further details.
            - definition [ref=f206e1492]:
              - generic "Information" [ref=f206e1493]
              - text: Both Server-Side Activation (SSA) and Legacy (Per-Title 5x5) titles can also utilize
              - link "Zero Day Piracy Protection (ZDPP)" [ref=f206e1494] [cursor=pointer]:
                - /url: /wiki/List_of_Games_for_Windows_-_LIVE_games#Zero_Day_Piracy_Protection_.28ZDPP.29
              - text: to prevent access to games before the release date. Protected titles are marked as such.
            - definition [ref=f206e1495]:
              - generic "Disadvantage" [ref=f206e1496]
              - text: Not supported worldwide; outside the
              - link "Xbox LIVE Countries and Regions" [ref=f206e1497] [cursor=pointer]:
                - /url: http://www.xbox.com/LIVE/countries
              - text: you can only use a
              - link "local profile" [ref=f206e1498] [cursor=pointer]:
