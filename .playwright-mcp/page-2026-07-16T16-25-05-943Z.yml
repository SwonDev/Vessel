          - heading [level=2] [ref=f206e4653]:
            - generic [ref=f206e4654]:
              - text: Hardware-based DRM
              - generic [ref=f206e4655]:
                - text: •
                - link "Link" [ref=f206e4656] [cursor=pointer]:
                  - /url: "#Hardware-based_DRM"
          - paragraph [ref=f206e4657]: Hardware-based DRM uses components of the PC such as the MAC address of network adapter(s) and serial number(s) of hard drive(s) to create a hash or signature which is used for identification of the PC in the DRM activation process. When a game which incorporates this type of DRM is run, it checks that the current components of the PC match the hash/signature which was created and stored during the previously completed activation. The tolerance for matching this hash varies by game, but in general if a significant component or components of the PC which comprise the hash have changed, the DRM will require a new activation to play the game. If an activation limit exists and is reached, the game will refuse to play. In most cases where this type of DRM is used, there will be methods to either revoke activations or reset the limit so a new activation is performed. These will be noted at the bottom of their respective sections below.
          - heading [level=3] [ref=f206e4658]:
            - generic [ref=f206e4659]:
              - text: Denuvo Anti-Tamper
              - generic [ref=f206e4660]:
                - text: •
                - link "Link" [ref=f206e4661] [cursor=pointer]:
                  - /url: "#Denuvo_Anti-Tamper"
          - generic [ref=f206e4662]:
            - definition [ref=f206e4663]:
              - generic "Information" [ref=f206e4664]
              - text: Windows-only executable obfuscation DRM made by some previous employees of Sony DADC DigitalWorks.
              - superscript [ref=f206e4665]:
                - link "[47]" [ref=f206e4666] [cursor=pointer]:
                  - /url: "#cite_note-47"
              - text: OS X and Linux versions of these games do not use this DRM.
            - definition [ref=f206e4667]:
              - generic "Information" [ref=f206e4668]
              - text: Uses online activation;
              - superscript [ref=f206e4669]:
                - link "[48]" [ref=f206e4670] [cursor=pointer]:
                  - /url: "#cite_note-48"
              - text: the game's support page can be used for manual authentication on systems without internet access.
              - superscript [ref=f206e4671]:
                - link "[49]" [ref=f206e4672] [cursor=pointer]:
                  - /url: "#cite_note-49"
            - definition [ref=f206e4673]:
              - generic "Information" [ref=f206e4674]
              - text: This section is automated; refer to the individual game pages to add or update entries.
