            - paragraph [ref=f206e96]: Project aim
            - list [ref=f206e97]:
              - listitem [ref=f206e98]: Offer a complete list of games available for purchase on Steam which have external DRM associated with them in addition to or in lieu of the various forms of Steam's native DRM.
            - paragraph [ref=f206e99]: Instructions
            - list [ref=f206e100]:
              - listitem [ref=f206e101]:
                - text: Refer to the
                - link "How to contribute" [ref=f206e102] [cursor=pointer]:
                  - /url: "#How_to_contribute"
                - text: section for information on adding games to this article.
              - listitem [ref=f206e103]: Included with the games are the DRM schemes involved, the issues and hindrances you might encounter due to this DRM, and what you can do to prevent DRM from interfering with your gaming experience.
            - paragraph [ref=f206e104]: Discussion
