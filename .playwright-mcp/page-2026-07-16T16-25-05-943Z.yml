              - link "contact support" [ref=f206e7528] [cursor=pointer]:
                - /url: https://support.securom.com/contact.html
              - text: .
            - definition [ref=f206e7529]:
              - generic "Information" [ref=f206e7530]
              - text: Use the
              - link "Removal Tool" [ref=f206e7531] [cursor=pointer]:
                - /url: https://support.securom.com/removaltool.html
              - text: to remove SecuROM activation information (after revoking the activations, if applicable).
