                - link "Link" [ref=f206e209] [cursor=pointer]:
                  - /url: "#Account-based_DRM"
          - paragraph [ref=f206e210]: DRM associated with accounts is weaker than most but still present, requiring online activation via a serial key or other identifiers to access online services such as multiplayer and profile stats. These games require activation through their servers and usage of their account system to do so, many even require these accounts to access the game at all.
          - definition [ref=f206e212]:
            - generic "Information" [ref=f206e213]
            - text: For single-player games, account-based DRM often does not affect the game to any real degree, as they can be played with an offline profile without activation. Games falling into this “single-player only” category will be marked as such.
