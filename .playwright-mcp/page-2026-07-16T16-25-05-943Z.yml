            - list [ref=f206e109]:
              - listitem [ref=f206e110]:
                - link "\"Unofficial List of Steam Games with DRM\" Steam Users' Forums thread" [ref=f206e111] [cursor=pointer]:
                  - /url: https://web.archive.org/web/20160828184807/http://forums.steampowered.com/forums/showthread.php?t=1537801
                - text: "- Original thread on this topic, all discussion has henceforth been moved to this wiki article."
              - listitem [ref=f206e112]:
                - link "The Big List of DRM-Free Games on Steam" [ref=f206e113] [cursor=pointer]:
                  - /url: /wiki/The_Big_List_of_DRM-Free_Games_on_Steam
                - text: "- A comparable list of Steam games which do not feature any sort of DRM."
              - listitem [ref=f206e114]: "DISCLAIMER: There are many games that have their own in-game store. There are also many games with DLC managed not by Steam but by the publishers themselves. These are NOT included in this list because, as previously stated, the products on these lists are available for purchase on Steam. Using non-Steam products on Steam products must be done at your own risk."
