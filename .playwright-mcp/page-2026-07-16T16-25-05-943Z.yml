          - heading [level=3] [ref=f206e333]:
            - generic [ref=f206e334]:
              - text: EA Accounts
              - generic [ref=f206e335]:
                - text: •
                - link "Link" [ref=f206e336] [cursor=pointer]:
                  - /url: "#EA_Accounts"
          - paragraph [ref=f206e337]: "EA Accounts exist for two purposes:"
          - paragraph [ref=f206e338]: To activate and run the game. This requires a constant Internet connection, even in single-player modes. The benefit to this, however, is that DLC, if it exists, is more easily managed than below.
          - paragraph [ref=f206e339]: To access online features, including DLC. In this case, the EA account is not required to access single-player (in some cases, it may be required to activate the game). For DLC, however, the game will require an account either way.
          - paragraph [ref=f206e340]: This list will be categorized as such, as well as games that use EA Classic accounts. Single-player games in the latter category will be specially marked, either as an option or exclusively single-player.
          - heading [level=4] [ref=f206e341]:
            - generic [ref=f206e342]:
              - text: EA App
              - generic [ref=f206e343]:
