          - generic [ref=e182]:
            - paragraph [ref=e183]:
              - text: The EA app, formerly EA Desktop and originally Origin, is a digital distribution platform operated by
              - link "Electronic Arts" [ref=e184] [cursor=pointer]:
                - /url: /wiki/Company:Electronic_Arts
              - text: .
            - paragraph [ref=e185]:
              - text: It serves as the digital distribution platform and DRM mechanism for all currently supported Electronic Arts games. Activation keys (also known as product code) of games published by EA that are sold through third-party storefronts can be used to activate games on EA App.
              - superscript [ref=e186]:
                - link "[2]" [ref=e187] [cursor=pointer]:
                  - /url: "#cite_note-4"
              - text: For a time, EA game activation keys sold on Humble Bundle were region-locked in Latin America for a limited time, but this lock had been since lifted.
            - paragraph [ref=e188]:
              - text: To protect its users, EA App supports two-factor authentication via email and third-party authenticator app.
              - superscript [ref=e189]:
                - link "[3]" [ref=e190] [cursor=pointer]:
                  - /url: "#cite_note-5"
            - paragraph
            - paragraph [ref=e191]:
              - text: Origin was launched on June 3, 2011 for Windows and February 8, 2013 for OS X. Origin was later superseded by the EA app on October 7, 2022 for Windows, with Windows games published on Origin migrated to the EA App. EA App for Mac was released in March 2024, but Origin for Mac continued to be available for those running on macOS 10.14 and older until April 17, 2025.
              - superscript [ref=e192]:
                - link "[4]" [ref=e193] [cursor=pointer]:
                  - /url: "#cite_note-6"
            - definition [ref=e195]:
              - generic "Disadvantage" [ref=e196]
              - text: EA games bought via third party storefronts, such as the
              - link "Epic Games Store" [ref=e197] [cursor=pointer]:
                - /url: /wiki/Epic_Games_Store
              - text: ","
              - link "Microsoft Store" [ref=e198] [cursor=pointer]:
                - /url: /wiki/Microsoft_Store
              - text: ", or"
              - link "Steam" [ref=e199] [cursor=pointer]:
                - /url: /wiki/Steam
              - text: requires those accounts to be linked to your EA account as they use the launcher as middleware.
            - paragraph
