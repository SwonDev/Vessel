          - paragraph [ref=e267]: EA Play (formerly Origin Access on PC and EA Access on Xbox One and PS4) is a monthly subscription service that grants access to a catalog of games and content through the EA app store. This subscription services comes in two forms; the default EA Play and the more expensive EA Play Pro tier. While the default tier includes the majority of games and content available through the service, some games and/or content might be exclusive to the Pro tier.
