                    - generic [ref=f461e278]: master.zion@gmail.com
                    - text: 2021-11-22 19:50:00 UTC
                  - generic [ref=f461e280]:
                    - text: "Hi everyone... it seems it is not possible to install the xbox application for PC using wine. It would be useful to play Windows games from xbox game pass, and it will be very useful on Steam deck. it fails during the installation startup. ------ Unhandled Exception: 0024:fixme:ntdll:EtwEventRegister ({8e9f5090-2d75-4d03-8a81-e5afbf85daf1}, 05E202EE, 00000000, 01EA96F4) stub. Unhandled Exception: System.IO.FileNotFoundException: Could not load file or assembly 'Windows.Foundation.UniversalApiContract, Version=7.0.0.0, Culture=neutral, PublicKeyToken=null, ContentType=WindowsRunt ime' or one of its dependencies. Module not found. at XboxInstaller.App..ctor() at XboxInstaller.App.Main() ------"
                    - link "https://www.xbox.com/en-IN/apps/xbox-app-for-pc" [ref=f461e281] [cursor=pointer]:
                      - /url: https://www.xbox.com/en-IN/apps/xbox-app-for-pc
                - generic [ref=f461e282]:
                  - generic [ref=f461e283]:
                    - link "Comment 1" [ref=f461e285] [cursor=pointer]:
                      - /url: show_bug.cgi?id=52092#c1
                    - generic [ref=f461e286]: Louis Lenders
                    - text: 2021-11-23 13:59:23 UTC
                  - generic [ref=f461e288]:
                    - text: Confirming. Seems related to UWP so for now i fear this is future music. The missing Windows.Foundation.UniversalApiContract seems to be contained in
                    - link "https://globalcdn.nuget.org/packages/microsoft.windows.sdk.contracts.10.0.22000.196.nupkg" [ref=f461e289] [cursor=pointer]:
                      - /url: https://globalcdn.nuget.org/packages/microsoft.windows.sdk.contracts.10.0.22000.196.nupkg
                    - text: "Google gives maybe some other useful info on this missing 'Windows.Foundation.UniversalApiContract':"
                    - link "https://www.thomasclaudiushuber.com/2019/04/26/calling-windows-10-apis-from-your-wpf-application/" [ref=f461e290] [cursor=pointer]:
                      - /url: https://www.thomasclaudiushuber.com/2019/04/26/calling-windows-10-apis-from-your-wpf-application/
                    - text: sha1sum XboxInstaller.exe ee07659a7efaa8ba7bd735b7ef8ad4279573e5c7 XboxInstaller.exe
